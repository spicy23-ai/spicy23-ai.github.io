<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;

  background:
  radial-gradient(circle at top left,#172554 0%,#0f172a 35%,#020617 100%);

  color:white;

  min-height:100vh;

  padding:25px;

  text-align:center;

  overflow-x:hidden;
}

/* Glow Background */

body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:#8b5cf6;
  filter:blur(180px);
  opacity:.15;
  top:-150px;
  right:-150px;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  background:#00f5ff;
  filter:blur(160px);
  opacity:.12;
  bottom:-120px;
  left:-120px;
  z-index:-1;
}

/* Language */

#languageSwitcher{

  padding:10px 14px;

  border-radius:14px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  color:white;

  backdrop-filter:blur(12px);

  margin-bottom:25px;
}

/* Main Card */

.book-card{

  width:95%;

  max-width:900px;

  margin:auto;
position:relative;
overflow:hidden;
  background:
  rgba(255,255,255,.05);

  border:
  1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(20px);

  border-radius:32px;

  padding:35px;

  box-shadow:
  0 0 40px rgba(139,92,246,.15);

  animation:fadeUp .7s ease;
}

/* Cover */

.book-cover{

  width:280px;

  max-width:100%;

  border-radius:24px;

  box-shadow:
  0 0 40px rgba(0,245,255,.15);

  transition:.4s;
}

.book-cover:hover{
  transform:
  perspective(1000px)
  rotateY(-6deg)
  translateY(-8px)
  scale(1.03);

  box-shadow:
  0 20px 60px rgba(139,92,246,.45);
}

  .book-card::before{
  content:"";
  position:absolute;
  top:0;
  left:-150%;
  width:60%;
  height:100%;
  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.08),
    transparent
  );
  transition:1s;
}

.book-card:hover::before{
  left:150%;
}
  
/* Title */

.book-title{

  font-size:42px;

  font-weight:900;

  margin:25px 0 15px;

  background:
  linear-gradient(
  to right,
  #00f5ff,
  #8b5cf6,
  #ff4ecd
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Description */

.description-box{

  margin:20px auto;

  max-width:700px;

  padding:18px;

  border-radius:20px;

  background:
  rgba(255,255,255,.04);

  color:#dbeafe;

  line-height:1.7;
}

/* Info Grid */

.info-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(180px,1fr));

  gap:15px;

  margin-top:25px;
}

.info-card{

  padding:16px;

  border-radius:20px;

  background:
  rgba(255,255,255,.04);

  border:
  1px solid rgba(255,255,255,.05);
}

.info-card span{

  display:block;

  color:#94a3b8;

  font-size:13px;

  margin-bottom:6px;
}

.info-card strong{

  color:white;

  font-size:15px;
}

/* Stats */

.stats{

  margin-top:25px;

  font-size:17px;

  color:#00f5ff;

  font-weight:bold;
}

.rating-actions{
  margin-top:20px;
}

.rating-btn{
  padding:12px 20px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  margin:5px;
  transition:.3s;
}

.like-btn{
  background:#16a34a;
  color:white;
}

.dislike-btn{
  background:#dc2626;
  color:white;
}

.rating-btn.active{
  box-shadow:0 0 20px rgba(255,255,255,.35);
  transform:scale(1.05);
}
  
/* Buttons */

.actions{

  margin-top:30px;
}

button{

  border:none;

  cursor:pointer;

  padding:15px 28px;

  border-radius:18px;

  color:white;

  font-weight:800;

  font-size:15px;

  margin:8px;

  transition:.35s;
}

#buyBtn{
position:relative;
overflow:hidden;
  background:
  linear-gradient(
  135deg,
  #00f5ff,
  #8b5cf6,
  #ff4ecd
  );

  box-shadow:
  0 0 25px rgba(139,92,246,.35);
}

#shareBtn{

  background:
  rgba(255,255,255,.06);

  border:
  1px solid rgba(255,255,255,.08);
}

button:hover{

  transform:
  translateY(-3px)
  scale(1.03);
}

#buyBtn::after{
  content:"";
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.25),
    transparent
  );

  transform:translateX(-150%);
}

#buyBtn:hover::after{
  transform:translateX(150%);
  transition:.8s;
}
  
/* Animation */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(25px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes floatGlow{
  0%{transform:translate(0,0);}
  50%{transform:translate(30px,-20px);}
  100%{transform:translate(0,0);}
}

body::before,
body::after{
  animation:floatGlow 12s ease-in-out infinite;
}
  
/* Mobile */

@media(max-width:700px){
.info-grid{
  grid-template-columns:repeat(2,1fr);
}
  .book-title{
    font-size:30px;
  }

  .book-card{
    padding:20px;
  }

}
</style>
</head>
<body>

<select id="languageSwitcher" onchange="changeLanguage()" style="
padding:8px 12px;
border-radius:12px;
margin:10px;
background:#222;
color:white;
border:1px solid #444;
">
  <option value="en">English</option>
  <option value="ar">العربية</option>
  <option value="fr">Français</option>
  <option value="zh">中文</option>
</select>

<div id="content">Loading book...</div>

<script>
const BACKEND_URL = "https://pi-backend-77pg.onrender.com";  let userUid = null;
let currentUser = null;
const ALLOWED_ORIGIN = "https://spicylibrary.space"; // موقعك

// ================= LANGUAGES =================

let currentLang =
  localStorage.getItem("appLanguage") || "en";

const translations = {

  en: {
    loading: "Loading book...",
    notFound: "Book not found",
    description: "Description",
    author: "Author",
    language: "Language",
    pages: "Pages",
    price: "Price",
    likes: "Likes",
    dislikes: "Dislikes",
    buy: "Buy with Pi 🪙",
    share: "Share Link 🔗",
    copied: "✅ Link copied to clipboard",
    copyManual: "⚠️ Copy manually:"
  },

  ar: {
    loading: "جاري تحميل الكتاب...",
    notFound: "الكتاب غير موجود",
    description: "الوصف",
    author: "المؤلف",
    language: "اللغة",
    pages: "الصفحات",
    price: "السعر",
    likes: "الإعجابات",
    dislikes: "عدم الإعجاب",
    buy: "شراء عبر Pi 🪙",
    share: "مشاركة الرابط 🔗",
    copied: "✅ تم نسخ الرابط",
    copyManual: "⚠️ انسخ الرابط يدوياً:"
  },

  fr: {
    loading: "Chargement du livre...",
    notFound: "Livre introuvable",
    description: "Description",
    author: "Auteur",
    language: "Langue",
    pages: "Pages",
    price: "Prix",
    likes: "Likes",
    dislikes: "Dislikes",
    buy: "Acheter avec Pi 🪙",
    share: "Partager le lien 🔗",
    copied: "✅ Lien copié",
    copyManual: "⚠️ Copiez manuellement :"
  },

  zh: {
    loading: "正在加载书籍...",
    notFound: "未找到书籍",
    description: "描述",
    author: "作者",
    language: "语言",
    pages: "页数",
    price: "价格",
    likes: "点赞",
    dislikes: "点踩",
    buy: "使用 Pi 购买 🪙",
    share: "分享链接 🔗",
    copied: "✅ 链接已复制",
    copyManual: "⚠️ 请手动复制："
  }
};

function changeLanguage() {

  currentLang =
    document.getElementById("languageSwitcher").value;

  localStorage.setItem("appLanguage", currentLang);

  document.body.style.direction =
    currentLang === "ar" ? "rtl" : "ltr";

 loadBook();
}
  
async function loginPi() {

  try {

    Pi.init({ version: "2.0" });

    const auth = await Pi.authenticate(
      ["username"],
      () => {}
    );

    currentUser = auth.user;
    userUid = auth.user.uid;

    localStorage.setItem(
      "userUid",
      userUid
    );

    return true;

  } catch(err) {

    console.error(err);
    alert("Login failed");

    return false;
  }
}
  
 
  
const params = new URLSearchParams(window.location.search);
const bookId = params.get("id");

if (!bookId) {
  document.getElementById("content").innerText =
  translations[currentLang].notFound;
}

// جلب بيانات الكتاب من السيرفر
async function loadBook() {
  try {
    const res = await fetch(`${BACKEND_URL}/book?id=${bookId}`);
    const data = await res.json();
    if (!data.success) throw new Error();

    const b = data.book;

    // جلب التقييمات (لايك و غير لايك)
    let likes = 0, dislikes = 0;
    try {
      const ratingsRes = await fetch(`${BACKEND_URL}/book-ratings`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ bookId: b.id })
      });
      const ratingsJson = await ratingsRes.json();
      if (ratingsJson.success) {
        likes = ratingsJson.likes || 0;
        dislikes = ratingsJson.dislikes || 0;
      }
    } catch(e) {
      console.error("Error loading ratings:", e);
    }

const t = translations[currentLang];
    
    document.getElementById("content").innerHTML = `
<div class="book-card">

<img src="${b.cover}" class="book-cover">

<h1 class="book-title">${b.title}</h1>

<div class="description-box">
${b.description || "No description"}
</div>

<div class="info-grid">

<div class="info-card">
<span>${t.author}</span>
<strong>${b.owner}</strong>
</div>

<div class="info-card">
<span>${t.language}</span>
<strong>${b.language || "Unknown"}</strong>
</div>

<div class="info-card">
<span>${t.pages}</span>
<strong>${b.pageCount || "Unknown"}</strong>
</div>

<div class="info-card">
<span>${t.price}</span>
<strong>${b.price} Pi</strong>
</div>

</div>

<div class="stats">
👍 <span id="likesCount">${likes}</span>
&nbsp;&nbsp; |
&nbsp;&nbsp;
👎 <span id="dislikesCount">${dislikes}</span>
</div>

<div class="rating-actions">
<button id="likeBtn" class="rating-btn like-btn">
👍 Like
</button>

<button id="dislikeBtn" class="rating-btn dislike-btn">
👎 Dislike
</button>
</div>

<div class="actions">
<button id="buyBtn">${t.buy}</button>
<button id="shareBtn">${t.share}</button>
</div>

</div>
`;

    // فتح الصفحة الرئيسية مع نفس الكتاب عند الشراء
  document.getElementById("buyBtn").onclick = () => {

  window.location.href =
    `https://spicylibrary.space/index.html?buyBookId=${b.id}`;

};

    // تسجيل دخول Pi

userUid = localStorage.getItem("userUid");

// تحميل تصويت المستخدم الحالي

if(userUid){

  try{

    const r = await fetch(
      `${BACKEND_URL}/book-ratings`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          bookId:b.id,
          userUid
        })
      }
    );

    const j = await r.json();

    if(j.userVote==="like"){
      document
        .getElementById("likeBtn")
        .classList.add("active");
    }

    if(j.userVote==="dislike"){
      document
        .getElementById("dislikeBtn")
        .classList.add("active");
    }

  }catch(err){
    console.error(err);
  }

}

// إرسال التصويت

async function sendVote(voteType){

 if(!userUid){

  const ok = await loginPi();

  if(!ok) return;

  userUid = localStorage.getItem("userUid");
}

  try{

    const res = await fetch(
      `${BACKEND_URL}/rate-book`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          bookId:b.id,
          voteType,
          userUid
        })
      }
    );

    const data = await res.json();

    if(data.success){

      loadBook();

    }

  }catch(err){

    console.error(err);

  }

}

document
.getElementById("likeBtn")
.onclick = () => sendVote("like");

document
.getElementById("dislikeBtn")
.onclick = () => sendVote("dislike");
    // زر مشاركة الرابط
    document.getElementById("shareBtn").onclick = () => {
      const bookUrl = window.location.href;
      if (navigator.share) {
        navigator.share({
          title: b.title,
          url: bookUrl
        }).catch(console.error);
      } else {
        navigator.clipboard.writeText(bookUrl)
          .then(() => alert(t.copied))
          .catch(() => alert(t.copyManual + " " + bookUrl));
      }
    };

  } catch(e) {
    console.error(e);
    document.getElementById("content").innerText = "Error loading book";
  }
}

window.addEventListener("load", () => {
userUid = localStorage.getItem("userUid");
  const savedLang =
    localStorage.getItem("appLanguage") || "en";

  document.getElementById("languageSwitcher").value =
    savedLang;

  currentLang = savedLang;

  document.body.style.direction =
    currentLang === "ar" ? "rtl" : "ltr";

  loadBook();
});

 


// استقبال نتيجة الدفع من index.html
window.addEventListener("message", (event) => {

  if (event.origin !== "https://spicylibrary.space")
    return;

  const msg = event.data;

  if (msg.type === "PAYMENT_SUCCESS") {

    alert("✅ Payment successful!");

    // تحويل المستخدم للتطبيق
    window.location.href =
      "https://spicylibrary.space/index.html";

  }

  if (msg.type === "PAYMENT_FAILED") {

    alert("❌ Payment failed");

  }

  if (msg.type === "PAYMENT_CANCELLED") {

    alert("⚠️ Payment cancelled");

  }

});

</script>
</body>
</html>
