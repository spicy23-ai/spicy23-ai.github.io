*{

body{

/* Glow Background */

body::after{

  /* ===== HEADER ===== */

.app-header{

display:flex;

justify-content:space-between;

align-items:center;

max-width:900px;

margin:0 auto 25px;

}

.app-logo{

display:flex;

align-items:center;

gap:12px;

text-decoration:none;

cursor:pointer;

}

.app-logo img{

width:52px;

height:52px;

border-radius:16px;

box-shadow:0 0 20px rgba(0,245,255,.25);

transition:.3s;

}

.app-logo:hover img{

transform:scale(1.08);

}

.app-name{

font-size:28px;

font-weight:900;

background:
linear-gradient(
90deg,
#00f5ff,
#8b5cf6,
#ff4ecd
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

  
/* Language */

#languageSwitcher{

  padding:10px 14px;

  border-radius:14px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  color:white;

  backdrop-filter:blur(12px);

  margin-bottom:25px;
}

/* Main Card */

.book-card{

  width:95%;

  max-width:900px;

  margin:auto;
position:relative;
overflow:hidden;
  background:
  rgba(255,255,255,.05);

  border:
  1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(20px);

  border-radius:32px;

  padding:35px;

  box-shadow:
  0 0 40px rgba(139,92,246,.15);

  animation:fadeUp .7s ease;
}

/* Cover */

.book-cover{

  width:280px;

  max-width:100%;
  border-radius:24px;

  box-shadow:
  0 0 40px rgba(0,245,255,.15);

  transition:.4s;
}

.book-cover:hover{
  transform:
  perspective(1000px)
  rotateY(-6deg)
  translateY(-8px)
  scale(1.03);

  box-shadow:
  0 20px 60px rgba(139,92,246,.45);
}

  .book-card::before{
  content:"";
  position:absolute;
  top:0;
  left:-150%;
  width:60%;
  height:100%;
  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.08),
    transparent
  );
  transition:1s;
}

.book-card:hover::before{
  left:150%;
}
  
/* Title */

.book-title{

  font-size:42px;
  font-weight:900;

  margin:25px 0 15px;

  background:
  linear-gradient(
  to right,
  #00f5ff,
  #8b5cf6,
  #ff4ecd

  -webkit-background-clip:text;

}

/* Description */

.description-box{

  margin:20px auto;

  max-width:700px;

  padding:18px;

  border-radius:20px;

  background:rgba(255,255,255,.04);

  color:#dbeafe;

  line-height:1.7;

  text-align:left;

}

.description-text{

  display:-webkit-box;

  -webkit-line-clamp:2;

  -webkit-box-orient:vertical;

  overflow:hidden;

}

.description-text.expanded{

  display:block;

}

.read-more{

  margin-top:12px;

  display:inline-block;

  color:#00f5ff;

  font-weight:bold;

  cursor:pointer;

  transition:.3s;

}

.read-more:hover{

  color:#8b5cf6;

}

/* Info Grid */

.info-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(180px,1fr));

  gap:15px;

  margin-top:25px;
}

.info-card{

  padding:16px;

  border-radius:20px;

  rgba(255,255,255,.04);

.info-card span{

.info-card strong{

/* Stats */

.rating-actions{

  margin:5px;

.like-btn{

.dislike-btn{

  color:white;

.rating-btn.active{
  box-shadow:0 0 20px rgba(255,255,255,.35);
  transform:scale(1.05);

/* Buttons */

button{

  border:none;

  cursor:pointer;

  padding:15px 28px;

  border-radius:18px;

  color:white;

  font-weight:800;

  font-size:15px;

  margin:8px;

  transition:.35s;
}

button:disabled{

  cursor:not-allowed;
}

#buyBtn{
position:relative;
overflow:hidden;
  background:
  linear-gradient(
  135deg,
  #00f5ff,
  #8b5cf6,
  #ff4ecd

#shareBtn{

button:hover{

}

#buyBtn::after{
  content:"";

  inset:0;

  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.25),
    transparent

  transform:translateX(-150%);
}

  transform:translateX(150%);
  transition:.8s;
}

.spinner{
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,.4);
  border-top:2px solid white;
  border-radius:50%;
  display:inline-block;
  margin-left:8px;
  vertical-align:middle;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
  
/* Animation */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(25px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes floatGlow{
  0%{transform:translate(0,0);}
  50%{transform:translate(30px,-20px);}
  100%{transform:translate(0,0);}
}

body::before,
body::after{
  animation:floatGlow 12s ease-in-out infinite;
}

/* ================= Language ================= */
function changeLanguage(){
  currentLang = document.getElementById("languageSwitcher").value;
  localStorage.setItem("appLanguage", currentLang);
  document.body.style.direction = currentLang === "ar" ? "rtl" : "ltr";
  loadBook();
}

/* ================= Login (single, unified flow) ================= */
async function onIncompletePaymentFound(payment){
  const paymentId = payment.identifier;
  const txid = payment.transaction?.txid || null;
  if(!txid) return;
  try{
    await fetch(`${BACKEND_URL}/complete-payment`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({paymentId,txid})
    });
  }catch(e){ console.error("Could not complete incomplete payment:", e); }
}

async function loginPi(){
  try{
    const auth = await Pi.authenticate(["username","payments"], onIncompletePaymentFound);
    userUid = auth.user.uid;
    currentUsername = auth.user.username;
    accessToken = auth.accessToken;
    localStorage.setItem("userUid", userUid);
    localStorage.setItem("username", currentUsername);
    localStorage.setItem("accessToken", accessToken);
    sdkAuthenticated = true;
    updateLoginUI();
    return true;
  }catch(err){
    console.error("Pi login failed:", err);
    sdkAuthenticated = false;
    return false;
  }
}

function clearSession(){
  userUid = null; accessToken = null; currentUsername = null;
  sdkAuthenticated = false;
  localStorage.removeItem("userUid");
  localStorage.removeItem("accessToken");
  localStorage.removeItem("username");
}

function updateLoginUI(){
  const loginBtn = document.getElementById("loginBtn");
  const userLabel = document.getElementById("userLabel");
  if(!loginBtn) return;
  if(userUid && accessToken){
    loginBtn.innerText = "✅ " + translations[currentLang].logged;
    loginBtn.disabled = true;
    if(userLabel) userLabel.innerText = currentUsername ? "👋 " + currentUsername : "";
  }else{
    loginBtn.innerText = translations[currentLang].login;
    loginBtn.disabled = false;
    if(userLabel) userLabel.innerText = "";
  }
}

/* Helper: POST with auth, auto re-login once if the token was rejected */
async function authedPost(url, extraBody){
  let body = Object.assign({}, extraBody, { userUid, accessToken });
  let res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
  let data = await res.json().catch(()=>({}));

  if(data && data.error === "Invalid access token"){
    clearSession();
    const ok = await loginPi();
    if(ok){
      body = Object.assign({}, extraBody, { userUid, accessToken });
      res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
      data = await res.json().catch(()=>({}));
    }
  }
  return { res, data };
}

/* ================= Load Book ================= */
if(!bookId){
  document.getElementById("content").innerText = translations[currentLang].notFound;
}

async function loadBook(){
  try{
    const res = await fetch(`${BACKEND_URL}/book?id=${bookId}&_=${Date.now()}`, { cache: "no-store" });
    const data = await res.json();
    if(!data.success) throw new Error();

    const b = data.book;
    const likes = b.likes || 0;
    const dislikes = b.dislikes || 0;
    const t = translations[currentLang];

    document.getElementById("content").innerHTML = `
<div class="book-card">

  <div class="login-bar">
    <button id="loginBtn"></button>
    <span id="userLabel"></span>
  </div>

  <img src="${b.cover}" class="book-cover">

  <h1 class="book-title">${b.title}</h1>

  <div class="description-box">
    <div id="bookDescription" class="description-text">${b.description || "No description"}</div>
    <div id="readMoreBtn" class="read-more" onclick="toggleDescription()">${t.readMore}</div>
  </div>

  <div class="info-grid">
    <div class="info-card"><span>${t.author}</span><strong>${b.owner}</strong></div>
    <div class="info-card"><span>${t.language}</span><strong>${b.language || "Unknown"}</strong></div>
    <div class="info-card"><span>${t.pages}</span><strong>${b.pageCount || "Unknown"}</strong></div>
    <div class="info-card"><span>${t.price}</span><strong>${b.price} Pi</strong></div>
  </div>

  <div class="stats">
    👍 <span id="likesCount">${likes}</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    👎 <span id="dislikesCount">${dislikes}</span>
  </div>

  <div class="rating-actions">
    <button id="likeBtn" class="rating-btn like-btn">${t.likeBtn}</button>
    <button id="dislikeBtn" class="rating-btn dislike-btn">${t.dislikeBtn}</button>
  </div>

  <div class="comment-actions">
    <button id="commentsBtn" class="comment-btn">${t.comments}</button>
  </div>

  <div class="actions">
    <button id="buyBtn">${t.buy}</button>
    <button id="shareBtn">${t.share}</button>
  </div>

</div>
`;

    updateLoginUI();

    document.getElementById("loginBtn").onclick = () => loginPi();
    document.getElementById("likeBtn").onclick = () => sendVote("like");
    document.getElementById("dislikeBtn").onclick = () => sendVote("dislike");
    document.getElementById("commentsBtn").onclick = () => openCommentsPanel();
    document.getElementById("shareBtn").onclick = () => shareBook(b);

    const buyBtn = document.getElementById("buyBtn");
    if(userUid && accessToken){
      try{
        const { data: checkData } = await authedPost(`${BACKEND_URL}/check-purchase`, { bookId: b.id });
        if(checkData && checkData.purchased){
          buyBtn.innerHTML = `${t.purchased}<br>${t.goToPurchases}`;
          buyBtn.onclick = () => { window.location.href = `${APP_BASE}/index.html?tab=purchases`; };
        }else{
          buyBtn.onclick = () => buyBook(b);
        }
      }catch(e){
        console.error(e);
        buyBtn.onclick = () => buyBook(b);
      }
    }else{
      buyBtn.onclick = () => buyBook(b);
    }

    if(userUid && accessToken){
      try{
        const { data: voteData } = await authedPost(`${BACKEND_URL}/book-ratings`, { bookId: b.id });
        if(voteData){
          if(voteData.userVote === "like") document.getElementById("likeBtn").classList.add("active");
          if(voteData.userVote === "dislike") document.getElementById("dislikeBtn").classList.add("active");
        }
      }catch(e){ console.error(e); }
    }

  }catch(e){
    console.error(e);
    document.getElementById("content").innerText = "Error loading book";
  }
}

/* ================= Voting ================= */
async function sendVote(voteType){
  if(!userUid || !accessToken){
    const ok = await loginPi();
    if(!ok) return;
  }
  try{
    const { data } = await authedPost(`${BACKEND_URL}/rate-book`, { bookId, voteType });
    if(data.success){
      loadBook();
    }else{
      openModal("⚠️ Vote Failed", data.error || "Please try again.");
    }
  }catch(e){ console.error(e); }
}

/* ================= Buy (now happens directly on this page) ================= */
async function buyBook(book){
  if(!sdkAuthenticated){
    const ok = await loginPi();
    if(!ok){
      openModal("⚠️", "Please login with Pi to buy this book.");
      return;
    }
  }

  const buyBtn = document.getElementById("buyBtn");
  const oldHtml = buyBtn.innerHTML;
  buyBtn.disabled = true;
  buyBtn.innerHTML = `${translations[currentLang].buy} <span class="spinner"></span>`;
  const resetBtn = () => { buyBtn.disabled = false; buyBtn.innerHTML = oldHtml; };

  try{
    await Pi.createPayment({
      amount: book.price,
      memo: "Spicy Library - Book Purchase",
      metadata: { bookId: book.id, userUid }
    }, {
      onReadyForServerApproval: async (paymentId) => {
        await fetch(`${BACKEND_URL}/approve-payment`, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ paymentId })
        });
      },
      onReadyForServerCompletion: async (paymentId, txid) => {
        try{
          const res = await fetch(`${BACKEND_URL}/complete-payment`, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ paymentId, txid })
          });
          const data = await res.json();
          if(!res.ok || !data.success){
            openModal("❌ Payment Failed", data.error || "The payment could not be completed.");
            resetBtn();
            return;
          }
          // نجاح الشراء: التوجه مباشرة إلى "مشترياتي"
          window.location.href = `${APP_BASE}/index.html?tab=purchases`;
        }catch(e){
          console.error(e);
          openModal("❌ Payment Failed", "The payment could not be completed.");
          resetBtn();
        }
      },
      onCancel: () => {
        openModal("⚠️ Payment Cancelled", "The payment was cancelled.");
        resetBtn();
      },
      onError: (err) => {
        openModal("❌ Payment Failed", "Payment error: " + err.message);
        resetBtn();
      }
    });
  }catch(err){
    console.error(err);
    openModal("⚠️", "Please use Pi Browser to complete the purchase.");
    resetBtn();
  }
}

/* ================= Comments (merged into one button/panel) ================= */
async function openCommentsPanel(){
  const t = translations[currentLang];
  try{
    const commentsRes = await fetch(`${BACKEND_URL}/comments?bookId=${bookId}`);
    const data = await commentsRes.json();

    let canComment = false;
    if(userUid){
      try{
        const checkRes = await fetch(`${BACKEND_URL}/has-comment?bookId=${bookId}&userUid=${userUid}`);
        const checkData = await checkRes.json();
        canComment = !!(checkData.success && !checkData.commented);
      }catch(e){ console.error(e); }
    }

    let html = "";
    if(userUid){
      if(canComment){
        html += `<div style="margin-bottom:15px;">
          <textarea id="newComment" placeholder="${t.writeCommentPlaceholder}" style="width:100%;height:80px;border-radius:12px;padding:10px;border:none;"></textarea>
          <button class="comment-btn" style="margin-top:10px;width:100%;" onclick="submitComment()">${t.save}</button>
        </div>`;
      }
    }else{
      html += `<div style="margin-bottom:15px;">
        <button class="comment-btn" style="width:100%;" onclick="loginPi()">${t.loginToComment}</button>
      </div>`;
    }

    if(!data.success || !data.comments.length){
      html += `<div style="padding:20px;text-align:center;">${t.noComments}</div>`;
    }else{
      data.comments.forEach(c => {
        html += `<div class="comment-box"><div class="comment-user">${c.username}</div><div>${c.text}</div></div>`;
      });
    }

    openModal(t.comments, html);
  }catch(e){
    console.error(e);
    openModal("❌", "Failed to load comments.");
  }
}

async function submitComment(){
  const textEl = document.getElementById("newComment");
  const text = textEl ? textEl.value.trim() : "";
  if(!text) return;

  if(!userUid || !accessToken){
    const ok = await loginPi();
    if(!ok) return;
  }

  try{
    const { data } = await authedPost(`${BACKEND_URL}/add-comment`, { bookId, text });
    if(data.success){
      openCommentsPanel();
    }else{
      openModal("❌", data.error || "Could not add comment");
    }
  }catch(e){
    console.error(e);
    openModal("❌", "Network error");
  }
}

/* ================= Share ================= */
function shareBook(b){
  const bookUrl = window.location.href;
  const t = translations[currentLang];
  if(navigator.share){
    navigator.share({ title: b.title, url: bookUrl }).catch(console.error);
  }else{
    navigator.clipboard.writeText(bookUrl)
      .then(() => openModal("🔗", t.copied))
      .catch(() => openModal("📋", t.copyManual + "\n\n" + bookUrl));
  }
}

/* ================= Description toggle ================= */
function toggleDescription(){
  const text = document.getElementById("bookDescription");
  const btn = document.getElementById("readMoreBtn");
  const t = translations[currentLang];
  text.classList.toggle("expanded");
  btn.innerHTML = text.classList.contains("expanded") ? t.readLess : t.readMore;
}

/* ================= Modal ================= */
function openModal(title, text){
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalText").innerHTML = text;
  document.getElementById("modal").classList.remove("hidden");
}
function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

/* ================= Init ================= */
window.addEventListener("load", async () => {
  document.getElementById("languageSwitcher").value = currentLang;
  document.body.style.direction = currentLang === "ar" ? "rtl" : "ltr";

  // تسجيل دخول تلقائي عند فتح الصفحة، فقط إذا لم تكن هناك جلسة محفوظة مسبقاً
  if(!userUid || !accessToken){
    await loginPi();
  }

  await loadBook();
});
