<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}
img {
  width: 250px;
  border-radius: 8px;
  margin-bottom: 10px;
}
button {
  padding: 10px 20px;
  background: #ff4500;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin: 10px;
}
button.share {
  background: #00aaff;
}
.info {
  font-size: 14px;
  color: #ccc;
  margin: 5px 0;
}
.stats {
  font-size: 14px;
  color: #0f9;
  margin: 5px 0;
}
</style>
</head>
<body>

<select id="languageSwitcher" onchange="changeLanguage()" style="
padding:8px 12px;
border-radius:12px;
margin:10px;
background:#222;
color:white;
border:1px solid #444;
">
  <option value="en">English</option>
  <option value="ar">العربية</option>
  <option value="fr">Français</option>
  <option value="zh">中文</option>
</select>

<div id="content">Loading book...</div>

<script>
const BACKEND_URL = "https://pi-backend-77pg.onrender.com";
const ALLOWED_ORIGIN = "https://spicy23-ai.github.io"; // موقعك

// ================= LANGUAGES =================

let currentLang =
  localStorage.getItem("appLanguage") || "en";

const translations = {

  en: {
    loading: "Loading book...",
    notFound: "Book not found",
    description: "Description",
    author: "Author",
    language: "Language",
    pages: "Pages",
    price: "Price",
    likes: "Likes",
    dislikes: "Dislikes",
    buy: "Buy with Pi 🪙",
    share: "Share Link 🔗",
    copied: "✅ Link copied to clipboard",
    copyManual: "⚠️ Copy manually:"
  },

  ar: {
    loading: "جاري تحميل الكتاب...",
    notFound: "الكتاب غير موجود",
    description: "الوصف",
    author: "المؤلف",
    language: "اللغة",
    pages: "الصفحات",
    price: "السعر",
    likes: "الإعجابات",
    dislikes: "عدم الإعجاب",
    buy: "شراء عبر Pi 🪙",
    share: "مشاركة الرابط 🔗",
    copied: "✅ تم نسخ الرابط",
    copyManual: "⚠️ انسخ الرابط يدوياً:"
  },

  fr: {
    loading: "Chargement du livre...",
    notFound: "Livre introuvable",
    description: "Description",
    author: "Auteur",
    language: "Langue",
    pages: "Pages",
    price: "Prix",
    likes: "Likes",
    dislikes: "Dislikes",
    buy: "Acheter avec Pi 🪙",
    share: "Partager le lien 🔗",
    copied: "✅ Lien copié",
    copyManual: "⚠️ Copiez manuellement :"
  },

  zh: {
    loading: "正在加载书籍...",
    notFound: "未找到书籍",
    description: "描述",
    author: "作者",
    language: "语言",
    pages: "页数",
    price: "价格",
    likes: "点赞",
    dislikes: "点踩",
    buy: "使用 Pi 购买 🪙",
    share: "分享链接 🔗",
    copied: "✅ 链接已复制",
    copyManual: "⚠️ 请手动复制："
  }
};

function changeLanguage() {

  currentLang =
    document.getElementById("languageSwitcher").value;

  localStorage.setItem("appLanguage", currentLang);

  document.body.style.direction =
    currentLang === "ar" ? "rtl" : "ltr";

  loadBook();
}
  
const params = new URLSearchParams(window.location.search);
const bookId = params.get("id");

if (!bookId) {
  document.getElementById("content").innerText =
  translations[currentLang].notFound;
}

// جلب بيانات الكتاب من السيرفر
async function loadBook() {
  try {
    const res = await fetch(`${BACKEND_URL}/book/${bookId}`);
    const data = await res.json();
    if (!data.success) throw new Error();

    const b = data.book;

    // جلب التقييمات (لايك و غير لايك)
    let likes = 0, dislikes = 0;
    try {
      const ratingsRes = await fetch(`${BACKEND_URL}/book-ratings`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ bookId: b.id })
      });
      const ratingsJson = await ratingsRes.json();
      if (ratingsJson.success) {
        likes = ratingsJson.likes || 0;
        dislikes = ratingsJson.dislikes || 0;
      }
    } catch(e) {
      console.error("Error loading ratings:", e);
    }

const t = translations[currentLang];
    
    document.getElementById("content").innerHTML = `
      <img src="${b.cover}" alt="Cover">
      <h2>${b.title}</h2>
      <p class="info"><strong>${t.description}:</strong> ${b.description || "No description"}</p>
     <p class="info"><strong>${t.author}:</strong> ${b.owner}</p>
      <p class="info"><strong>${t.language}:</strong> ${b.language || "Unknown"}</p>
      <p class="info"><strong>${t.pages}:</strong> ${b.pageCount || "Unknown"}</p>
      <p class="info"><strong>${t.price}:</strong> ${b.price} Pi</p>
      <p class="stats">
👍 ${t.likes}: ${likes} |
👎 ${t.dislikes}: ${dislikes}
</p>
      <button id="buyBtn">${t.buy}</button>
      <button id="shareBtn" class="share">${t.share}</button>
    `;

    // فتح الصفحة الرئيسية مع نفس الكتاب عند الشراء
  document.getElementById("buyBtn").onclick = () => {

  window.location.href =
    `https://spicy23-ai.github.io/index.html?buyBookId=${b.id}`;

};
    // زر مشاركة الرابط
    document.getElementById("shareBtn").onclick = () => {
      const bookUrl = window.location.href;
      if (navigator.share) {
        navigator.share({
          title: b.title,
          url: bookUrl
        }).catch(console.error);
      } else {
        navigator.clipboard.writeText(bookUrl)
          .then(() => alert(t.copied))
          .catch(() => alert(t.copyManual + " " + bookUrl));
      }
    };

  } catch(e) {
    console.error(e);
    document.getElementById("content").innerText = "Error loading book";
  }
}

window.addEventListener("load", () => {

  const savedLang =
    localStorage.getItem("appLanguage") || "en";

  document.getElementById("languageSwitcher").value =
    savedLang;

  currentLang = savedLang;

  document.body.style.direction =
    currentLang === "ar" ? "rtl" : "ltr";

  loadBook();
});

 


// استقبال نتيجة الدفع من index.html
window.addEventListener("message", (event) => {

  if (event.origin !== "https://spicy23-ai.github.io")
    return;

  const msg = event.data;

  if (msg.type === "PAYMENT_SUCCESS") {

    alert("✅ Payment successful!");

    // تحويل المستخدم للتطبيق
    window.location.href =
      "https://spicy23-ai.github.io/index.html";

  }

  if (msg.type === "PAYMENT_FAILED") {

    alert("❌ Payment failed");

  }

  if (msg.type === "PAYMENT_CANCELLED") {

    alert("⚠️ Payment cancelled");

  }

});

</script>
</body>
</html>
