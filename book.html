<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;

  background:
  radial-gradient(circle at top left,#172554 0%,#0f172a 35%,#020617 100%);

  color:white;

  min-height:100vh;

  padding:25px;

  text-align:center;

  overflow-x:hidden;
}

/* Glow Background */

body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:#8b5cf6;
  filter:blur(180px);
  opacity:.15;
  top:-150px;
  right:-150px;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  background:#00f5ff;
  filter:blur(160px);
  opacity:.12;
  bottom:-120px;
  left:-120px;
  z-index:-1;
}


  /* ===== HEADER ===== */

.app-header{

display:flex;

justify-content:space-between;

align-items:center;

max-width:900px;

margin:0 auto 25px;

}

.app-logo{

display:flex;

align-items:center;

gap:12px;

text-decoration:none;

cursor:pointer;

}

.app-logo img{

width:52px;

height:52px;

border-radius:16px;

box-shadow:0 0 20px rgba(0,245,255,.25);

transition:.3s;

}

.app-logo:hover img{

transform:scale(1.08);

}

.app-name{

font-size:28px;

font-weight:900;

background:
linear-gradient(
90deg,
#00f5ff,
#8b5cf6,
#ff4ecd
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

  
/* Language */

#languageSwitcher{

  padding:10px 14px;

  border-radius:14px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  color:white;

  backdrop-filter:blur(12px);

  margin-bottom:25px;
}

/* Main Card */

.book-card{

  width:95%;

  max-width:900px;

  margin:auto;
position:relative;
overflow:hidden;
  background:
  rgba(255,255,255,.05);

  border:
  1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(20px);

  border-radius:32px;

  padding:35px;

  box-shadow:
  0 0 40px rgba(139,92,246,.15);

  animation:fadeUp .7s ease;
}

/* Cover */

.book-cover{

  width:280px;

  max-width:100%;
  border-radius:24px;

  box-shadow:
  0 0 40px rgba(0,245,255,.15);

  transition:.4s;
}

.book-cover:hover{
  transform:
  perspective(1000px)
  rotateY(-6deg)
  translateY(-8px)
  scale(1.03);

  box-shadow:
  0 20px 60px rgba(139,92,246,.45);
}

  .book-card::before{
  content:"";
  position:absolute;
  top:0;
  left:-150%;
  width:60%;
  height:100%;
  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.08),
    transparent
  );
  transition:1s;
}

.book-card:hover::before{
  left:150%;
}
  
/* Title */

.book-title{

  font-size:42px;
  font-weight:900;

  margin:25px 0 15px;

  background:
  linear-gradient(
  to right,
  #00f5ff,
  #8b5cf6,
  #ff4ecd
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Description */

.description-box{

  margin:20px auto;

  max-width:700px;

  padding:18px;

  border-radius:20px;

  background:rgba(255,255,255,.04);

  color:#dbeafe;

  line-height:1.7;

  text-align:left;

}

.description-text{

  display:-webkit-box;

  -webkit-line-clamp:2;

  -webkit-box-orient:vertical;

  overflow:hidden;

}

.description-text.expanded{

  display:block;

}

.read-more{

  margin-top:12px;

  display:inline-block;

  color:#00f5ff;

  font-weight:bold;

  cursor:pointer;

  transition:.3s;

}

.read-more:hover{

  color:#8b5cf6;

}

/* Info Grid */

.info-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(180px,1fr));

  gap:15px;

  margin-top:25px;
}

.info-card{

  padding:16px;

  border-radius:20px;

  background:
  rgba(255,255,255,.04);

  border:
  1px solid rgba(255,255,255,.05);
}

.info-card span{

  display:block;

  color:#94a3b8;

  font-size:13px;

  margin-bottom:6px;
}

.info-card strong{

  color:white;

  font-size:15px;
}

/* Stats */

.stats{

  margin-top:25px;

  font-size:17px;

  color:#00f5ff;

  font-weight:bold;
}

.rating-actions{
  margin-top:20px;
}

.rating-btn{
  padding:12px 20px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  margin:5px;
  transition:.3s;
}

.like-btn{
  background:#16a34a;
  color:white;
}

.dislike-btn{
  background:#dc2626;
  color:white;
}

.rating-btn.active{
  box-shadow:0 0 20px rgba(255,255,255,.35);
  transform:scale(1.05);
}
  
/* Buttons */

.actions{

  margin-top:30px;
}

button{

  border:none;

  cursor:pointer;

  padding:15px 28px;

  border-radius:18px;

  color:white;

  font-weight:800;

  font-size:15px;

  margin:8px;

  transition:.35s;
}

#buyBtn{
position:relative;
overflow:hidden;
  background:
  linear-gradient(
  135deg,
  #00f5ff,
  #8b5cf6,
  #ff4ecd
  );

  box-shadow:
  0 0 25px rgba(139,92,246,.35);
}

#shareBtn{

  background:
  rgba(255,255,255,.06);

  border:
  1px solid rgba(255,255,255,.08);
}

button:hover{

  transform:
  translateY(-3px)
  scale(1.03);
}

#buyBtn::after{
  content:"";
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.25),
    transparent
  );

  transform:translateX(-150%);
}

#buyBtn:hover::after{
  transform:translateX(150%);
  transition:.8s;
}
  
/* Animation */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(25px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes floatGlow{
  0%{transform:translate(0,0);}
  50%{transform:translate(30px,-20px);}
  100%{transform:translate(0,0);}
}

body::before,
body::after{
  animation:floatGlow 12s ease-in-out infinite;
}
  
/* Mobile */

@media(max-width:700px){
.info-grid{
  grid-template-columns:repeat(2,1fr);
}
  .book-title{
    font-size:30px;
  }

  .book-card{
    padding:20px;
  }

}

  .modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.modal-box{

  linear-gradient(
    180deg,

  flex-direction:column;

  border:1px solid rgba(255,255,255,.08);

  #modalTitle{

  max-height:45vh;

  overflow-x:hidden;

}
.modal-box button{

  width:100%;

  padding:15px;

  border-radius:18px;

  font-weight:800;

  background:
  linear-gradient(
    135deg,
    #00f5ff,

    #ff4ecd
  );

.modal-box button:hover{

  transform:

.hidden{

.header-right{

.comment-actions{

margin-top:12px;

.comment-user{
color:#00f5ff;

margin-bottom:5px;
}
  
</style>

function changeLanguage() {

  currentLang =
    document.getElementById("languageSwitcher").value;

  localStorage.setItem("appLanguage", currentLang);

  document.body.style.direction =
    currentLang === "ar" ? "rtl" : "ltr";

  // زر تسجيل الدخول
  if (document.getElementById("loginBtn")) {
    document.getElementById("loginBtn").innerText =
      translations[currentLang].login;
  }

  // نافذة التعليق
  if (document.getElementById("commentTitle")) {
    document.getElementById("commentTitle").innerText =
      translations[currentLang].leaveComment;

    document.getElementById("saveCommentBtn").innerText =
      translations[currentLang].save;

    document.getElementById("cancelCommentBtn").innerText =
      translations[currentLang].cancel;
  }

  loadBook();
}

  try {

    Pi.init({ version: "2.0" });

    const auth = await Pi.authenticate(
      ["username"],
      () => {}
    );

    currentUser = auth.user;
    userUid = auth.user.uid;

    localStorage.setItem(
      "userUid",
      userUid
    );

  auth.accessToken
);

"👋 " + auth.user.username;

const buyBtn = document.getElementById("buyBtn");
if (buyBtn) {

}
  
    return true;

  } catch(err) {

  }
}

      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
  bookId:b.id,

  accessToken
})

}

 function openModal(title,text){

  document.getElementById("modalTitle").innerText = title;

  document.getElementById("modalText").innerHTML = text; // 👈 مهم جداً

  document.getElementById("modal").classList.remove("hidden");

}

function closeModal(){

  document.getElementById("modal").classList.add("hidden");

}


function openCommentModal(){

document
.getElementById("commentModal")
.classList.remove("hidden");

}

function closeCommentModal(){

document
.getElementById("commentModal")
.classList.add("hidden");

}

async function saveComment() {

  const text = document.getElementById("commentText").value;

  if (!text) return;

  const res = await fetch(`${BACKEND_URL}/add-comment`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      bookId,
      userUid,
      accessToken,
      text
    })
  });

  const data = await res.json();

  if (data.success) {

  closeCommentModal();

  openModal("✅", "Comment added successfully");

  // إعادة تحميل الصفحة بعد ثانية واحدة
 setTimeout(() => {
  window.location.href = window.location.href;
}, 1000);

} else {

  openModal("❌", data.error);

}
}
